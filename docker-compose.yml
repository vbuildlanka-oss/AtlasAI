# Atlas Intelligence — local infrastructure
# Brings up Postgres with the pgvector extension for RAG storage.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
