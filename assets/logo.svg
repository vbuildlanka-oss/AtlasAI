<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Churn Radar logo">
  <defs>
    <radialGradient id="scope" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12211c"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <linearGradient id="sweep" x1="120" y1="120" x2="120" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ee6a6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2ee6a6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- scope face -->
  <circle cx="120" cy="120" r="112" fill="url(#scope)" stroke="#2ee6a6" stroke-opacity="0.9" stroke-width="3"/>

  <!-- range rings -->
  <g fill="none" stroke="#2ee6a6" stroke-opacity="0.28" stroke-width="1.5">
    <circle cx="120" cy="120" r="30"/>
    <circle cx="120" cy="120" r="60"/>
    <circle cx="120" cy="120" r="90"/>
  </g>
  <!-- cross-hairs -->
  <g stroke="#2ee6a6" stroke-opacity="0.22" stroke-width="1.5">
    <line x1="120" y1="12" x2="120" y2="228"/>
    <line x1="12" y1="120" x2="228" y2="120"/>
  </g>

  <!-- radar sweep wedge -->
  <path d="M120 120 L120 12 A108 108 0 0 1 213.5 66 Z" fill="url(#sweep)"/>
  <line x1="120" y1="120" x2="213.5" y2="66" stroke="#2ee6a6" stroke-width="2.5" stroke-opacity="0.9"/>

  <!-- detected churn blip -->
  <circle cx="171" cy="79" r="7" fill="#ff5c72" filter="url(#glow)"/>
  <!-- a couple of faint contacts -->
  <circle cx="84" cy="150" r="3.5" fill="#2ee6a6" fill-opacity="0.7"/>
  <circle cx="150" cy="168" r="3" fill="#2ee6a6" fill-opacity="0.5"/>

  <!-- center hub -->
  <circle cx="120" cy="120" r="5" fill="#2ee6a6" filter="url(#glow)"/>
</svg>
